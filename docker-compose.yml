
# --- DEFINICIONES REUTILIZABLES ---
x-cassandra-environment: &cassandra_environment
  CASSANDRA_CLUSTER_NAME: ClusterProyecto
  CASSANDRA_SEEDS: "nodo1"
  CASSANDRA_DC: DC1
  CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
  MAX_HEAP_SIZE: 512M

x-healthcheck-def: &healthcheck_def
  test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
  interval: 20s
  timeout: 10s
  retries: 10
  start_period: 60s

services:
  # --- NODO SEED (PRINCIPAL) ---
  nodo1:
    image: cassandra:latest
    container_name: nodo1
    hostname: nodo1
    ports:
      - "9042:9042"
    environment:
      <<: *cassandra_environment
    networks:
      red-bd-distribuida:
        ipv4_address: 172.25.0.2
    healthcheck: *healthcheck_def
    volumes:
      - cassandra_data_1:/var/lib/cassandra

  # --- NODOS WORKERS ---
  nodo2:
    image: cassandra:latest
    container_name: nodo2
    hostname: nodo2
    ports:
      - "9043:9042"
    environment:
      <<: *cassandra_environment
    networks:
      red-bd-distribuida:
        ipv4_address: 172.25.0.3
    healthcheck: *healthcheck_def
    depends_on:
      nodo1:
        condition: service_healthy
    volumes:
      - cassandra_data_2:/var/lib/cassandra

  nodo3:
    image: cassandra:latest
    container_name: nodo3
    hostname: nodo3
    ports:
      - "9044:9042"
    environment:
      <<: *cassandra_environment
    networks:
      red-bd-distribuida:
        ipv4_address: 172.25.0.4
    healthcheck: *healthcheck_def
    depends_on:
      nodo2:
        condition: service_healthy
    volumes:
      - cassandra_data_3:/var/lib/cassandra

  nodo4:
    image: cassandra:latest
    container_name: nodo4
    hostname: nodo4
    ports:
      - "9045:9042"
    environment:
      <<: *cassandra_environment
    networks:
      red-bd-distribuida:
        ipv4_address: 172.25.0.5
    healthcheck: *healthcheck_def
    depends_on:
      nodo3:
        condition: service_healthy
    volumes:
      - cassandra_data_4:/var/lib/cassandra

  nodo5:
    image: cassandra:latest
    container_name: nodo5
    hostname: nodo5
    ports:
      - "9046:9042"
    environment:
      <<: *cassandra_environment
    networks:
      red-bd-distribuida:
        ipv4_address: 172.25.0.6
    depends_on:
      nodo4:
        condition: service_healthy
    volumes:
      - cassandra_data_5:/var/lib/cassandra

  # --- SERVICIO DE AUTOMATIZACIÓN (INIT) ---
  cassandra-init:
    image: cassandra:latest
    container_name: cassandra-init
    depends_on:
      nodo1:
        condition: service_healthy
      nodo2:
        condition: service_healthy
    volumes:
      - ./scripts/init.cql:/init.cql
    networks:
      - red-bd-distribuida
    command: >
      bash -c "
      echo '⏳ Esperando a que el cluster se estabilice (Nodos 1 y 2)...' &&
      sleep 10 && 
      echo '✅ Nodos listos. Ejecutando init.cql...' &&
      cqlsh nodo1 9042 -f /init.cql &&
      echo '🚀 Inicialización COMPLETADA.'
      "

networks:
  red-bd-distribuida:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  cassandra_data_1:
  cassandra_data_2:
  cassandra_data_3:
  cassandra_data_4:
  cassandra_data_5: